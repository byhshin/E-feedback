<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />

  <title>교육 이해도 확인</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #687386;
      --line: #dfe6f1;
      --primary: #1769e0;
      --primary-dark: #0f55b8;
      --danger: #d83434;
      --ok: #0b8f55;
      --shadow: 0 10px 30px rgba(27, 47, 80, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 42%, #eef2f7 100%);
      color: var(--text);
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 14px 36px;
    }

    .lang-bar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      margin: 6px 0 12px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(224, 231, 242, 0.95);
      box-shadow: 0 4px 16px rgba(25, 43, 70, 0.07);
    }

    .flag {
      width: 100%;
      height: 31px;
      object-fit: cover;
      border-radius: 7px;
      cursor: pointer;
      border: 2px solid transparent;
      background: #fff;
      box-shadow: 0 1px 5px rgba(0,0,0,0.14);
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .flag:active { transform: scale(0.96); }
    .flag.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 105, 224, 0.16);
    }

    .card {
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(222, 230, 242, 0.9);
      overflow: hidden;
    }

    .header {
      padding: 22px 20px 16px;
      background: linear-gradient(135deg, #155fd0 0%, #1c7af4 100%);
      color: #fff;
    }

    .header h1 {
      margin: 0 0 14px;
      font-size: 24px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      font-size: 14px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 11px;
      border-radius: 12px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
    }

    .meta-label { opacity: 0.84; white-space: nowrap; }
    .meta-value { font-weight: 700; text-align: right; }

    form { padding: 20px; }

    .field { margin-bottom: 18px; }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 2px;
    }

    .field-grid .field { margin-bottom: 18px; }

    .question-field {
      margin-top: 2px;
      padding-top: 2px;
    }

    label, .label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .required::after {
      content: " *";
      color: var(--danger);
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 13px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(23, 105, 224, 0.12);
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.45;
    }

    .hint {
      margin-top: 7px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .radio-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .radio-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .radio-card input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio-card:has(input:checked) {
      border-color: var(--primary);
      background: #edf5ff;
      color: var(--primary-dark);
      box-shadow: 0 0 0 4px rgba(23, 105, 224, 0.1);
    }

    .actions { margin-top: 8px; }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px 14px;
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(23, 105, 224, 0.25);
    }

    button:disabled {
      opacity: 0.62;
      cursor: not-allowed;
      box-shadow: none;
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .message.ok {
      display: block;
      color: #075c38;
      background: #e9f8f0;
      border: 1px solid #bde9d1;
    }

    .message.err {
      display: block;
      color: #9d1b1b;
      background: #fff0f0;
      border: 1px solid #f3c6c6;
    }

    .footer-note {
      padding: 13px 20px 20px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    [dir="rtl"] body, [dir="rtl"] input, [dir="rtl"] select, [dir="rtl"] textarea, [dir="rtl"] button {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    @media (max-width: 360px) {
      .lang-bar { grid-template-columns: repeat(5, 1fr); }
      .header h1 { font-size: 22px; }
      .field-grid { grid-template-columns: 1fr; gap: 0; }
      form { padding: 18px 16px; }
    }
  </style>
</head>

          </div>
        </div>
      </section>

      <form id="feedbackForm" autocomplete="off">
        <div class="field-grid">
          <div class="field">
            <label for="name" class="required" data-i18n="nameLabel">이름</label>
            <input id="name" name="name" type="text" data-i18n-placeholder="namePlaceholder" placeholder="이름을 입력하세요" required />
          </div>

          <div class="field">
            <label for="affiliation" class="required" data-i18n="affiliationLabel">소속</label>
            <select id="affiliation" name="affiliation" required></select>
          </div>
        </div>

        <div class="field question-field">
          <div class="label required" data-i18n="understandLabel">교육을 이해했습니까?</div>
          <div class="radio-group">
            <label class="radio-card">
              <input type="radio" name="understood" value="Y" required />
              <span data-i18n="yes">예</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="understood" value="N" required />
              <span data-i18n="no">아니오</span>
            </label>
          </div>
        </div>

        <div class="field">

        </div>

        <div class="actions">
          <button type="submit" id="submitBtn" data-i18n="submit">제출하기</button>
        </div>
        <div id="message" class="message"></div>
      </form>

      <div class="footer-note" data-i18n="footer">제출 전 입력 내용을 확인해 주세요.</div>
    </main>

    function decodeParam(value) {
      if (!value) return "";
      try { return decodeURIComponent(value).trim(); }
      catch (e) { return value.trim(); }
    }

    function normalizeType(value) {
      const v = String(value || "").toLowerCase().trim();
      if (["직영", "direct", "employee", "internal", "inhouse", "owner"].includes(v)) return "직영";
      if (["협력사", "partner", "vendor", "sub", "contractor", "company"].includes(v)) return "협력사";
      return "";
    }

    function getT(key) {
      return (I18N[currentLang] && I18N[currentLang][key]) || I18N.ko[key] || key;
    }

    function getCourseLabel() {
      const pack = COURSE_LABELS[rawCourse];
      if (!pack) return rawCourse;
      return pack[currentLang] || pack.ko || rawCourse;
    }

    function getTypeLabel(typeValue) {
      if (typeValue === "직영") return getT("direct");
      if (typeValue === "협력사") return getT("partner");
      return "-";
    }

    function getOrgLabel(orgValue) {
      const pack = ORG_LABELS[orgValue];
      if (!pack) return orgValue || "";
      return pack[currentLang] || pack.en || pack.ko || orgValue;
    }

    function fillAffiliation() {
      const list = workerType === "협력사" ? PARTNER_ORGS : (workerType === "직영" ? DIRECT_ORGS : []);
      const previous = el.affiliation.value;
      el.affiliation.innerHTML = "";
      const placeholder = new Option(getT("affiliationPlaceholder"), "");
      placeholder.disabled = true;
      placeholder.selected = true;
      el.affiliation.add(placeholder);
      list.forEach(item => el.affiliation.add(new Option(getOrgLabel(item), item)));
      if (list.includes(previous)) el.affiliation.value = previous;
    }

    function applyI18n() {
      const meta = LANG_META[currentLang] || LANG_META.ko;
      document.documentElement.lang = currentLang;
      document.documentElement.dir = meta.dir;

      document.querySelectorAll("[data-i18n]").forEach(node => {
        const key = node.getAttribute("data-i18n");
        node.textContent = getT(key);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(node => {
        const key = node.getAttribute("data-i18n-placeholder");
        node.setAttribute("placeholder", getT(key));
      });
      document.querySelectorAll(".flag").forEach(flag => {
        flag.classList.toggle("active", flag.dataset.lang === currentLang);
      });

      el.courseText.textContent = getCourseLabel();
      el.typeText.textContent = getTypeLabel(workerType);
      fillTypeSelect();
      fillAffiliation();
      clearMessage();
    }

    function changeLang(lang) {
      if (!I18N[lang]) lang = "ko";

    function clearMessage() {
      el.message.className = "message";
      el.message.textContent = "";

    function showMessage(type, text) {

      event.preventDefault();
      clearMessage();

      if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_GOOGLE_APPS_SCRIPT")) {
        showMessage("err", getT("setupError"));
        return;
      }

      const understoodInput = document.querySelector("input[name='understood']:checked");
      const understoodCode = understoodInput ? understoodInput.value : "";
      const meta = LANG_META[currentLang] || LANG_META.ko;

      const payload = {
        submittedAtClient: new Date().toISOString(),
        course: rawCourse,
        courseDisplay: getCourseLabel(),
        workerType: workerType,
        workerTypeDisplay: getTypeLabel(workerType),
        language: currentLang,
        languageCode: meta.sheetCode,
        languageName: meta.name,
        name: el.name.value.trim(),
        affiliation: getOrgLabel(el.affiliation.value),
        affiliationBase: el.affiliation.value,
        understoodCode: understoodCode,
        understoodText: selectedUnderstandText(understoodCode),
        comment: el.comment.value.trim(),
        pageUrl: location.href,
        userAgent: navigator.userAgent
      };

      el.submitBtn.disabled = true;
      el.submitBtn.textContent = getT("submitting");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        el.form.reset();
        fillAffiliation();
        showMessage("ok", getT("success"));
      } catch (err) {
        showMessage("err", getT("error"));
      } finally {
        el.submitBtn.disabled = false;
        el.submitBtn.textContent = getT("submit");
      }
    });

    window.changeLang = changeLang;
    init();
  </script>
</body>
</html>
