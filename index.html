<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>교육 피드백</title>
	<style>
	  :root {
		--bg: #f4f7fb;
		--card: #ffffff;
		--text: #172033;
		--muted: #687386;
		--line: #dfe6f1;
		--primary: #1769e0;
		--primary-dark: #0f55b8;
		--danger: #d83434;
		--ok: #0b8f55;
		--shadow: 0 10px 30px rgba(27, 47, 80, 0.12);
	  }

	  * { box-sizing: border-box; }

	  body {
		margin: 0;
		min-height: 100vh;
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
		background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 42%, #eef2f7 100%);
		color: var(--text);
	  }

	  .wrap {
		width: 100%;
		max-width: 520px;
		margin: 0 auto;
		padding: 14px 14px 36px;
	  }

	  .lang-bar {
		display: grid;
		grid-template-columns: repeat(6, 1fr);
		gap: 7px;
		margin: 6px 0 12px;
		padding: 10px;
		border-radius: 18px;
		background: rgba(255, 255, 255, 0.74);
		border: 1px solid rgba(224, 231, 242, 0.95);
		box-shadow: 0 4px 16px rgba(25, 43, 70, 0.07);
	  }

	  .flag {
		width: 100%;
		height: 31px;
		object-fit: cover;
		border-radius: 7px;
		cursor: pointer;
		border: 2px solid transparent;
		background: #fff;
		box-shadow: 0 1px 5px rgba(0,0,0,0.14);
		transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
	  }

	  .flag:active { transform: scale(0.96); }

	  .flag.active {
		border-color: var(--primary);
		box-shadow: 0 0 0 3px rgba(23, 105, 224, 0.16);
	  }

	  .card {
		background: var(--card);
		border-radius: 22px;
		box-shadow: var(--shadow);
		border: 1px solid rgba(222, 230, 242, 0.9);
		overflow: hidden;
	  }

	  .header {
		padding: 22px 20px 16px;
		background: linear-gradient(135deg, #155fd0 0%, #1c7af4 100%);
		color: #fff;
	  }

	  .header h1 {
		margin: 0 0 14px;
		font-size: 24px;
		letter-spacing: -0.5px;
		text-align: center;
	  }

	  .meta {
		display: grid;
		grid-template-columns: 1fr;
		gap: 8px;
		font-size: 14px;
	  }

	  .meta-row {
		display: flex;
		justify-content: space-between;
		gap: 10px;
		padding: 9px 11px;
		border-radius: 12px;
		background: rgba(255,255,255,0.14);
		backdrop-filter: blur(8px);
	  }

	  .meta-label {
		opacity: 0.84;
		white-space: nowrap;
	  }

	  .meta-value {
		font-weight: 700;
		text-align: right;
	  }

	  form { padding: 20px; }

	  .field { margin-bottom: 18px; }

	  .field-grid {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 10px;
		margin-bottom: 2px;
	  }

	  .field-grid .field { margin-bottom: 18px; }

	  .question-field {
		margin-top: 2px;
		padding-top: 2px;
	  }

	  label, .label {
		display: block;
		margin-bottom: 8px;
		font-size: 15px;
		font-weight: 700;
		color: var(--text);
	  }

	  .required::after {
		content: " *";
		color: var(--danger);
		font-weight: 800;
	  }

	  input, select, textarea {
		  width: 100%;
		  border: 1px solid var(--line);
		  border-radius: 14px;
		  padding: 14px 13px;
		  font-size: 16px;
		  font-family: inherit;
		  outline: none;
		  background: #fff;
		  color: var(--text);
		  transition: border-color 0.12s ease, box-shadow 0.12s ease;
		}
		
		select {
		  min-height: 52px;
		  height: 52px;
		  line-height: 52px;
		  padding: 0 42px 0 13px;
		  cursor: pointer;
		  -webkit-appearance: auto;
		  appearance: auto;
		}

	  input:focus, select:focus, textarea:focus {
		border-color: var(--primary);
		box-shadow: 0 0 0 4px rgba(23, 105, 224, 0.12);
	  }

	  textarea {
		min-height: 112px;
		resize: vertical;
		line-height: 1.45;
	  }

	  .hint {
		margin-top: 7px;
		font-size: 12px;
		color: var(--muted);
		line-height: 1.35;
	  }

	  .special-field {
		display: none;
		padding: 14px;
		margin-bottom: 18px;
		border: 1px solid #d8e7ff;
		border-radius: 16px;
		background: #f5f9ff;
	  }

	  .special-field.show { display: block; }

	  /* 점수 선택 영역 */
	  .score-scale {
		width: 100%;
	  }

	  .score-group {
		display: grid;
		grid-template-columns: repeat(5, minmax(0, 1fr));
		gap: 0;
		width: 100%;
		height: 62px;
		border: 1px solid #b8c4d4;
		border-radius: 12px;
		overflow: hidden;
		background: #fff;
		direction: ltr;
	  }

	  .score-card {
		position: relative;
		display: flex;
		align-items: center;
		justify-content: center;
		height: 62px;
		min-height: 62px;
		padding: 0;
		margin: 0;
		border: 0;
		border-right: 1px solid #c8d2df;
		border-radius: 0;
		background: #fff;
		cursor: pointer;
		user-select: none;
		text-align: center;
		transition: background 0.12s ease, color 0.12s ease;
	  }

	  .score-card:last-child {
		border-right: 0;
	  }

	  .score-card strong {
		display: block;
		margin: 0;
		padding: 0;
		font-size: 18px;
		line-height: 1;
		font-weight: 900;
		color: #273247;
		background: transparent;
	  }

	  .score-card input {
		position: absolute;
		opacity: 0;
		pointer-events: none;
	  }

	  .score-card:hover {
		background: #f3f8ff;
	  }

	  .score-card:has(input:checked),
	  .score-card.selected {
		background: var(--primary) !important;
		color: #fff !important;
		box-shadow: none !important;
		outline: none !important;
	  }

	  .score-card:has(input:checked) strong,
	  .score-card.selected strong {
		color: #fff !important;
		background: transparent !important;
	  }

	  .score-labels {
		display: flex;
		justify-content: space-between;
		gap: 12px;
		margin-top: 8px;
		font-size: 12px;
		color: var(--muted);
		line-height: 1.3;
		font-weight: 700;
		direction: ltr;
	  }

	  .score-labels span:first-child {
		text-align: left;
	  }

	  .score-labels span:last-child {
		text-align: right;
	  }

	  .checkbox-group {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 9px;
	  }

	  .checkbox-card {
		position: relative;
		display: flex;
		align-items: center;
		justify-content: center;
		min-height: 48px;
		padding: 10px;
		border: 1px solid var(--line);
		border-radius: 14px;
		background: #fff;
		cursor: pointer;
		user-select: none;
		font-size: 14px;
		font-weight: 800;
		text-align: center;
	  }

	  .checkbox-card input {
		position: absolute;
		opacity: 0;
		pointer-events: none;
	  }

	  .checkbox-card:has(input:checked) {
		border-color: var(--primary);
		background: #edf5ff;
		color: var(--primary-dark);
		box-shadow: 0 0 0 4px rgba(23, 105, 224, 0.08);
	  }

	  .radio-group {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 10px;
	  }

	  .radio-card {
		position: relative;
		display: flex;
		align-items: center;
		justify-content: center;
		min-height: 52px;
		padding: 12px;
		border: 1px solid var(--line);
		border-radius: 15px;
		background: #fff;
		font-weight: 800;
		cursor: pointer;
		user-select: none;
	  }

	  .radio-card input {
		position: absolute;
		opacity: 0;
		pointer-events: none;
	  }

	  .radio-card:has(input:checked) {
		border-color: var(--primary);
		background: #edf5ff;
		color: var(--primary-dark);
		box-shadow: 0 0 0 4px rgba(23, 105, 224, 0.1);
	  }

	  .actions { margin-top: 8px; }

	  button {
		width: 100%;
		border: 0;
		border-radius: 16px;
		padding: 16px 14px;
		font-size: 17px;
		font-weight: 900;
		color: #fff;
		background: var(--primary);
		cursor: pointer;
		box-shadow: 0 8px 18px rgba(23, 105, 224, 0.25);
	  }

	  button:disabled {
		opacity: 0.62;
		cursor: not-allowed;
		box-shadow: none;
	  }

	  .message {
		display: none;
		margin-top: 14px;
		padding: 13px 14px;
		border-radius: 14px;
		font-size: 14px;
		line-height: 1.4;
		white-space: pre-wrap;
	  }

	  .message.ok {
		display: block;
		color: #075c38;
		background: #e9f8f0;
		border: 1px solid #bde9d1;
	  }

	  .message.err {
		display: block;
		color: #9d1b1b;
		background: #fff0f0;
		border: 1px solid #f3c6c6;
	  }

	  .footer-note {
		padding: 13px 20px 20px;
		font-size: 12px;
		color: var(--muted);
		text-align: center;
		line-height: 1.45;
	  }

	  [dir="rtl"] body,
	  [dir="rtl"] input,
	  [dir="rtl"] select,
	  [dir="rtl"] textarea,
	  [dir="rtl"] button {
		font-family: "Segoe UI", Tahoma, Arial, sans-serif;
	  }

	  @media (max-width: 420px) {
		.score-group {
		  height: 58px;
		  grid-template-columns: repeat(5, minmax(0, 1fr));
		}

		.score-card {
		  height: 58px;
		  min-height: 58px;
		  padding: 0;
		}

		.score-card strong {
		  font-size: 17px;
		}

		.checkbox-group {
		  grid-template-columns: 1fr 1fr;
		}
	  }

	  @media (max-width: 360px) {
		.lang-bar {
		  grid-template-columns: repeat(5, 1fr);
		}

		.header h1 {
		  font-size: 22px;
		}

		.field-grid {
		  grid-template-columns: 1fr;
		  gap: 0;
		}

		form {
		  padding: 18px 16px;
		}

		.score-group {
		  height: 56px;
		}

		.score-card {
		  height: 56px;
		  min-height: 56px;
		}
	  }
		.dk-logo-footer {
		  padding: 4px 20px 26px;
		  text-align: center;
		}
		
		.dk-logo-footer img {
		  width: 130px;
		  max-width: 42%;
		  height: auto;
		  opacity: 0.9;
		  display: inline-block;
		}
	</style>
</head>
<body>
  <div class="wrap">
    <div class="lang-bar" aria-label="language selection">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/KO.png" onclick="changeLang('ko')" class="flag" data-lang="ko" alt="KO">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/EN.png" onclick="changeLang('en')" class="flag" data-lang="en" alt="EN">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/NE.png" onclick="changeLang('ne')" class="flag" data-lang="ne" alt="NE">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/VI.png" onclick="changeLang('vi')" class="flag" data-lang="vi" alt="VI">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/TR.png" onclick="changeLang('tr')" class="flag" data-lang="tr" alt="TR">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/RU.png" onclick="changeLang('ru')" class="flag" data-lang="ru" alt="RU">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/FR.png" onclick="changeLang('fr')" class="flag" data-lang="fr" alt="FR">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/ZH.png" onclick="changeLang('zh')" class="flag" data-lang="zh" alt="ZH">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/TH.png" onclick="changeLang('th')" class="flag" data-lang="th" alt="TH">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/AR.png" onclick="changeLang('ar')" class="flag" data-lang="ar" alt="AR">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/UZ.png" onclick="changeLang('uz')" class="flag" data-lang="uz" alt="UZ">
    </div>

    <main class="card">
      <section class="header">
        <h1 data-i18n="title">교육 이수 후 피드백</h1>
        <div class="meta">
          <div class="meta-row">
            <span class="meta-label" data-i18n="courseLabel">교육과정</span>
            <span class="meta-value" id="courseText">-</span>
          </div>
          <div class="meta-row">
            <span class="meta-label" data-i18n="typeLabel">구분</span>
            <span class="meta-value" id="typeText">-</span>
          </div>
        </div>
      </section>

      <form id="feedbackForm" autocomplete="off">
        <div class="field-grid">
          <div class="field">
            <label for="name" class="required" data-i18n="nameLabel">이름</label>
            <input id="name" name="name" type="text" data-i18n-placeholder="namePlaceholder" placeholder="이름을 입력하세요" required />
          </div>

          <div class="field">
            <label for="affiliation" class="required" data-i18n="affiliationLabel">소속</label>
            <select id="affiliation" name="affiliation" required></select>
          </div>
        </div>

        <div class="field special-field" id="specialCourseField">
          <label for="specialCourse" class="required" data-i18n="specialCourseLabel">특별교육 과정을 선택해 주세요</label>
          <select id="specialCourse" name="specialCourse"></select>
          <div class="hint" data-i18n="specialCourseHint">특별안전보건교육 QR에서만 표시됩니다.</div>
        </div>

        <div class="field question-field">
          <div class="label required" data-i18n="q1Label">1. 오늘 이수한 교육은 이해하기 쉬웠습니까?</div>
          <div class="score-scale">
            <div class="score-group" role="radiogroup" aria-label="q1">
              <label class="score-card"><input type="radio" name="q1_score" value="1" required /><strong>1</strong></label>
              <label class="score-card"><input type="radio" name="q1_score" value="2" required /><strong>2</strong></label>
              <label class="score-card"><input type="radio" name="q1_score" value="3" required /><strong>3</strong></label>
              <label class="score-card"><input type="radio" name="q1_score" value="4" required /><strong>4</strong></label>
              <label class="score-card"><input type="radio" name="q1_score" value="5" required /><strong>5</strong></label>
            </div>
            <div class="score-labels"><span data-i18n="scoreLow">전혀 아니다</span><span data-i18n="scoreHigh">매우 그렇다</span></div>
          </div>
        </div>

        <div class="field question-field">
          <div class="label required" data-i18n="q2Label">2. 오늘 이수한 교육이 실제 작업에 도움이 되었습니까?</div>
          <div class="score-scale">
            <div class="score-group" role="radiogroup" aria-label="q2">
              <label class="score-card"><input type="radio" name="q2_score" value="1" required /><strong>1</strong></label>
              <label class="score-card"><input type="radio" name="q2_score" value="2" required /><strong>2</strong></label>
              <label class="score-card"><input type="radio" name="q2_score" value="3" required /><strong>3</strong></label>
              <label class="score-card"><input type="radio" name="q2_score" value="4" required /><strong>4</strong></label>
              <label class="score-card"><input type="radio" name="q2_score" value="5" required /><strong>5</strong></label>
            </div>
            <div class="score-labels"><span data-i18n="scoreLow">전혀 아니다</span><span data-i18n="scoreHigh">매우 그렇다</span></div>
          </div>
        </div>

        <div class="field">
          <div class="label" data-i18n="improvementLabel">3. 개선이 필요한 부분이 있습니까? ※ 선택</div>
          <div class="checkbox-group">
            <label class="checkbox-card"><input type="checkbox" name="improvement" value="교육시간" /><span data-i18n="impTime">교육시간</span></label>
            <label class="checkbox-card"><input type="checkbox" name="improvement" value="교육자료" /><span data-i18n="impMaterial">교육자료</span></label>
            <label class="checkbox-card"><input type="checkbox" name="improvement" value="설명방식" /><span data-i18n="impExplain">설명방식</span></label>
            <label class="checkbox-card"><input type="checkbox" name="improvement" value="통역/번역" /><span data-i18n="impTranslation">통역/번역</span></label>
            <label class="checkbox-card"><input type="checkbox" name="improvement" value="현장 적용성" /><span data-i18n="impField">현장 적용성</span></label>
            <label class="checkbox-card"><input type="checkbox" name="improvement" value="기타" /><span data-i18n="impEtc">기타</span></label>
          </div>
          <div class="hint" data-i18n="improvementHint">복수 선택 가능하며, 해당 없으면 선택하지 않고 제출할 수 있습니다.</div>
        </div>

        <div class="field">
          <label for="comment" data-i18n="commentLabel2">4. 건의사항 ※ 선택</label>
          <textarea id="comment" name="comment" data-i18n-placeholder="commentPlaceholder" placeholder="내용을 입력하세요. 없으면 비워두셔도 됩니다."></textarea>
        </div>

        <div class="actions">
          <button type="submit" id="submitBtn" data-i18n="submit">제출하기</button>
        </div>
        <div id="message" class="message"></div>
      </form>

      <div class="footer-note" data-i18n="footer">교육 이수 후 입력해 주세요.</div>

		<div class="dk-logo-footer">
		  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/logo.png" alt="DK Logo">
		</div>
    </main>
  </div>

  <script>
    /*****************************************************************
     * 1) Google Apps Script 웹앱 URL을 아래에 붙여넣으세요.
     *****************************************************************/
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkyV6-xAR1ZaYRk3Qo1k1l3um6VYgaq1z2hJ0pWbSD8dH3Re1-grU0J7JFOhoNfMww/exec";

    const ALLOWED_UPLOAD_RANGES_CLIENT = [
      { start: "08:00", end: "10:00" },
      { start: "10:10", end: "12:00" },
      { start: "13:00", end: "15:00" },
      { start: "15:10", end: "17:00" }
    ];

    function isUploadAllowedNowClient() {
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();

      return ALLOWED_UPLOAD_RANGES_CLIENT.some(function(range) {
        const start = parseUploadTimeToMinutesClient(range.start);
        const end = parseUploadTimeToMinutesClient(range.end);
        return current >= start && current < end;
      });
    }

    function parseUploadTimeToMinutesClient(value) {
      const parts = String(value).split(":");
      return Number(parts[0]) * 60 + Number(parts[1]);
    }

    function getAllowedUploadTextClient() {
      return ALLOWED_UPLOAD_RANGES_CLIENT
        .map(function(range) {
          return range.start + "~" + range.end;
        })
        .join(", ");
    }

    function getUploadBlockedMessageClient() {
      return "현재는 피드백 제출 가능 시간이 아닙니다.\n\n"
        + "제출 가능 시간: " + getAllowedUploadTextClient() + "\n"
        + "교육 이수 후 근무시간 내 제출해 주세요.";
    }

    /*****************************************************************
     * 2) 소속 목록
     *****************************************************************/
    const DIRECT_ORGS = [
      "HSE팀", "품질팀", "공무팀", "의장팀", "탑재팀", "물류팀",
      "도장팀", "생산운영팀", "관리팀", "재무팀", "자재팀", "조립팀"
    ];

    const PARTNER_ORGS = [
      "해양", "연승", "우솔", "경한", "이륙", "성훈",
      "명우", "유영", "일성", "백영", "성주", "해봉"
    ];


    /*****************************************************************

        ko: "자재팀", en: "Materials Team", ne: "सामग्री टोली", vi: "Đội vật tư", tr: "Malzeme Ekibi", ru: "Отдел материалов", fr: "Équipe matériel", zh: "材料组", th: "ทีมวัสดุ", ar: "فريق المواد", uz: "Materiallar jamoasi"
      },
      "조립팀": {
        ko: "조립팀", en: "Assembly Team", ne: "असेंबली टोली", vi: "Đội lắp ráp", tr: "Montaj/İmalat Ekibi", ru: "Сборочная команда", fr: "Équipe assemblage", zh: "组装组", th: "ทีมประกอบ", ar: "فريق التجميع", uz: "Yig‘ish jamoasi"
      },
      "해양": { ko: "해양", en: "Haeyang", ne: "Haeyang", vi: "Haeyang", tr: "Haeyang", ru: "Haeyang", fr: "Haeyang", zh: "Haeyang", th: "Haeyang", ar: "Haeyang", uz: "Haeyang" },
      "연승": { ko: "연승", en: "Yeonseung", ne: "Yeonseung", vi: "Yeonseung", tr: "Yeonseung", ru: "Yeonseung", fr: "Yeonseung", zh: "Yeonseung", th: "Yeonseung", ar: "Yeonseung", uz: "Yeonseung" },
      "우솔": { ko: "우솔", en: "Usol", ne: "Usol", vi: "Usol", tr: "Usol", ru: "Usol", fr: "Usol", zh: "Usol", th: "Usol", ar: "Usol", uz: "Usol" },
      "경한": { ko: "경한", en: "Gyeonghan", ne: "Gyeonghan", vi: "Gyeonghan", tr: "Gyeonghan", ru: "Gyeonghan", fr: "Gyeonghan", zh: "Gyeonghan", th: "Gyeonghan", ar: "Gyeonghan", uz: "Gyeonghan" },
      "이륙": { ko: "이륙", en: "Iryuk", ne: "Iryuk", vi: "Iryuk", tr: "Iryuk", ru: "Iryuk", fr: "Iryuk", zh: "Iryuk", th: "Iryuk", ar: "Iryuk", uz: "Iryuk" },
      "성훈": { ko: "성훈", en: "Seonghun", ne: "Seonghun", vi: "Seonghun", tr: "Seonghun", ru: "Seonghun", fr: "Seonghun", zh: "Seonghun", th: "Seonghun", ar: "Seonghun", uz: "Seonghun" },
      "명우": { ko: "명우", en: "Myeongwoo", ne: "Myeongwoo", vi: "Myeongwoo", tr: "Myeongwoo", ru: "Myeongwoo", fr: "Myeongwoo", zh: "Myeongwoo", th: "Myeongwoo", ar: "Myeongwoo", uz: "Myeongwoo" },
      "유영": { ko: "유영", en: "Yuyeong", ne: "Yuyeong", vi: "Yuyeong", tr: "Yuyeong", ru: "Yuyeong", fr: "Yuyeong", zh: "Yuyeong", th: "Yuyeong", ar: "Yuyeong", uz: "Yuyeong" },
      "일성": { ko: "일성", en: "Ilsung", ne: "Ilsung", vi: "Ilsung", tr: "Ilsung", ru: "Ilsung", fr: "Ilsung", zh: "Ilsung", th: "Ilsung", ar: "Ilsung", uz: "Ilsung" },
      "백영": { ko: "백영", en: "Baekyoung", ne: "Baekyoung", vi: "Baekyoung", tr: "Baekyoung", ru: "Baekyoung", fr: "Baekyoung", zh: "Baekyoung", th: "Baekyoung", ar: "Baekyoung", uz: "Baekyoung" },
      "성주": { ko: "성주", en: "Seongju", ne: "Seongju", vi: "Seongju", tr: "Seongju", ru: "Seongju", fr: "Seongju", zh: "Seongju", th: "Seongju", ar: "Seongju", uz: "Seongju" },
      "해봉": { ko: "해봉", en: "Haebong", ne: "Haebong", vi: "Haebong", tr: "Haebong", ru: "Haebong", fr: "Haebong", zh: "Haebong", th: "Haebong", ar: "Haebong", uz: "Haebong" }
    };

    const params = new URLSearchParams(location.search);
    let currentLang = "ko";
    let rawCourse = decodeParam(params.get("course")) || "교육과정 미지정";
    let workerType = normalizeType(decodeParam(params.get("type")) || "");

    const el = {
      form: document.getElementById("feedbackForm"),
      name: document.getElementById("name"),
      affiliation: document.getElementById("affiliation"),
      workerType: document.getElementById("workerType"),
      typeSelectField: document.getElementById("typeSelectField"),
      specialCourseField: document.getElementById("specialCourseField"),
      specialCourse: document.getElementById("specialCourse"),
      courseText: document.getElementById("courseText"),
      typeText: document.getElementById("typeText"),
      message: document.getElementById("message"),
      submitBtn: document.getElementById("submitBtn"),
      comment: document.getElementById("comment")
    };

    function decodeParam(value) {
      if (!value) return "";
      try { return decodeURIComponent(value).trim(); }
      catch (e) { return value.trim(); }
    }

    function normalizeType(value) {
      const v = String(value || "").toLowerCase().trim();
      if (["직영", "direct", "employee", "internal", "inhouse", "owner"].includes(v)) return "직영";
      if (["협력사", "partner", "vendor", "sub", "contractor", "company"].includes(v)) return "협력사";
      return "";
    }

    function getT(key) {
      return (I18N_EXTRA[currentLang] && I18N_EXTRA[currentLang][key]) ||
             (I18N[currentLang] && I18N[currentLang][key]) ||
             (I18N_EXTRA.ko && I18N_EXTRA.ko[key]) ||
             I18N.ko[key] || key;
    }

    function getCourseLabel() {
      const pack = COURSE_LABELS[rawCourse];
      if (!pack) return rawCourse;
      return pack[currentLang] || pack.ko || rawCourse;
    }

    function getTypeLabel(typeValue) {
      if (typeValue === "직영") return getT("direct");
      if (typeValue === "협력사") return getT("partner");
      return "-";
    }

    function getOrgLabel(orgValue) {
      const pack = ORG_LABELS[orgValue];
      if (!pack) return orgValue || "";
      return pack[currentLang] || pack.en || pack.ko || orgValue;
    }

    function fillTypeSelect() { /* 구분은 QR 주소값으로만 처리 */ }

    function fillAffiliation() {
      const list = workerType === "협력사" ? PARTNER_ORGS : (workerType === "직영" ? DIRECT_ORGS : []);
      const previous = el.affiliation.value;
      el.affiliation.innerHTML = "";
      const placeholder = new Option(getT("affiliationPlaceholder"), "");
      placeholder.disabled = true;
      placeholder.selected = true;
      el.affiliation.add(placeholder);
      list.forEach(item => el.affiliation.add(new Option(getOrgLabel(item), item)));
      if (list.includes(previous)) el.affiliation.value = previous;
    }


    function isSpecialCourse() {
      return String(rawCourse || "").replace(/\s+/g, "").includes("특별안전보건교육") ||
             String(rawCourse || "").replace(/\s+/g, "").includes("특별교육");
    }

    function fillSpecialCourse() {
      if (!el.specialCourse || !el.specialCourseField) return;
      const previous = el.specialCourse.value;
      el.specialCourse.innerHTML = "";
      const placeholder = new Option(getT("specialCoursePlaceholder"), "");
      placeholder.disabled = true;
      placeholder.selected = true;
      el.specialCourse.add(placeholder);
      SPECIAL_COURSES.forEach(item => el.specialCourse.add(new Option(getSpecialCourseName(item.code), item.code)));
      if (SPECIAL_COURSES.some(item => item.code === previous)) el.specialCourse.value = previous;

      const show = isSpecialCourse();
      el.specialCourseField.classList.toggle("show", show);
      el.specialCourse.required = show;
    }

    function getSpecialCourseName(code) {
      const found = SPECIAL_COURSES.find(item => item.code === code);
      if (!found) return "";
      return found[currentLang] || found.en || found.ko || "";
    }

    function getSpecialCourseBaseName(code) {
      const found = SPECIAL_COURSES.find(item => item.code === code);
      return found ? found.ko : "";
    }

    function applyI18n() {
      const meta = LANG_META[currentLang] || LANG_META.ko;
      document.documentElement.lang = currentLang;
      document.documentElement.dir = meta.dir;

      document.querySelectorAll("[data-i18n]").forEach(node => {
        const key = node.getAttribute("data-i18n");
        node.textContent = getT(key);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(node => {
        const key = node.getAttribute("data-i18n-placeholder");
        node.setAttribute("placeholder", getT(key));
      });
      document.querySelectorAll(".flag").forEach(flag => {
        flag.classList.toggle("active", flag.dataset.lang === currentLang);
      });

      el.courseText.textContent = getCourseLabel();
      el.typeText.textContent = getTypeLabel(workerType);
      fillTypeSelect();
      fillAffiliation();
      fillSpecialCourse();
      clearMessage();
    }

    function changeLang(lang) {
      if (!I18N[lang]) lang = "ko";
      currentLang = lang;
      applyI18n();
    }

    function clearMessage() {
      el.message.className = "message";
      el.message.textContent = "";
    }

    function showMessage(type, text) {
      el.message.className = "message " + type;
      el.message.textContent = text;
    }

    function selectedUnderstandText(code) {
      return code === "Y" ? getT("yes") : getT("no");
    }
    function init() {
      if (!workerType) {
        workerType = "";
        el.typeText.textContent = "QR 구분값 없음";
      }
      applyI18n();
      if (!workerType) {
        el.submitBtn.disabled = true;
        showMessage("err", getT("qrTypeError"));
      }
    }

    el.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();

      if (!isUploadAllowedNowClient()) {
        showMessage("err", getUploadBlockedMessageClient());
        return;
      }

      if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_GOOGLE_APPS_SCRIPT")) {
        showMessage("err", getT("setupError"));
        return;
      }

      const q1Input = document.querySelector("input[name='q1_score']:checked");
      const q2Input = document.querySelector("input[name='q2_score']:checked");
      const q1Score = q1Input ? q1Input.value : "";
      const q2Score = q2Input ? q2Input.value : "";
      const improvements = Array.from(document.querySelectorAll("input[name='improvement']:checked")).map(input => input.value);
      const meta = LANG_META[currentLang] || LANG_META.ko;
      const specialCourseCode = isSpecialCourse() ? el.specialCourse.value : "";
      const specialCourseName = isSpecialCourse() ? getSpecialCourseBaseName(specialCourseCode) : "";
      const specialCourseDisplay = isSpecialCourse() ? getSpecialCourseName(specialCourseCode) : "";

      const payload = {
        submittedAtClient: new Date().toISOString(),
        course: rawCourse,
        courseDisplay: getCourseLabel(),
        specialCourseCode: specialCourseCode,
        specialCourseName: specialCourseName,
        specialCourseDisplay: specialCourseDisplay,
        workerType: workerType,
        workerTypeDisplay: getTypeLabel(workerType),
        language: currentLang,
        languageCode: meta.sheetCode,
        languageName: meta.name,
        name: el.name.value.trim(),
        affiliation: getOrgLabel(el.affiliation.value),
        affiliationBase: el.affiliation.value,
        q1Score: q1Score,
        q1Text: "오늘 이수한 교육은 이해하기 쉬웠습니까?",
        q2Score: q2Score,
        q2Text: "오늘 이수한 교육이 실제 작업에 도움이 되었습니까?",
        improvement: improvements.length ? improvements.join(", ") : "-",
        comment: el.comment.value.trim() || "-",
        pageUrl: location.href,
        userAgent: navigator.userAgent
      };

      el.submitBtn.disabled = true;
      el.submitBtn.textContent = getT("submitting");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        el.form.reset();
        fillAffiliation();
        showMessage("ok", getT("success"));
      } catch (err) {
        showMessage("err", getT("error"));
      } finally {
        el.submitBtn.disabled = false;
        el.submitBtn.textContent = getT("submit");
      }
    });

    window.changeLang = changeLang;
    init();
  </script>
</body>
</html>
